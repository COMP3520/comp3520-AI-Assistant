<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n8n Agent UI</title>
  <style>
    :root {
      --bg-color: #121212;
      --chat-bg: #1e1e1e;
      --user-msg: #ea4b71;
      --bot-msg: #2d2d2d;
      --text-color: #e0e0e0;
    }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; height: 100vh; }
    .chat-container { width: 100%; max-width: 600px; background: var(--chat-bg); display: flex; flex-direction: column; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .header { padding: 20px; border-bottom: 1px solid #333; font-weight: bold; display: flex; align-items: center; gap: 10px; }
    .header-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; }
    .backend-row { padding: 8px 20px; border-bottom: 1px solid #2a2a2a; font-size: 12px; color: #9a9a9a; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .backend-hint { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .backend-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .mini-btn { background: #232323; border: 1px solid #444; color: #cfcfcf; font-size: 12px; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
    .mini-btn:hover { border-color: #666; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .message-row { display: flex; flex-direction: column; }
    .message-row.user { align-items: flex-end; }
    .message-row.bot { align-items: flex-start; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.4; font-size: 15px; }
    .message.user { background: var(--user-msg); color: white; border-bottom-right-radius: 2px; }
    .message.bot { background: var(--bot-msg); color: var(--text-color); border-bottom-left-radius: 2px; }
    .tts-btn { margin-top: 6px; background: none; border: 1px solid #444; border-radius: 6px; color: #aaa; font-size: 13px; padding: 4px 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
    .tts-btn:hover { border-color: #ea4b71; color: #ea4b71; }
    .tts-btn.playing { border-color: #2ecc71; color: #2ecc71; }
    .tts-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-area { padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; align-items: center; }
    input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2d2d2d; color: white; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--user-msg); }
    button { padding: 12px 20px; border-radius: 8px; border: none; background: var(--user-msg); color: white; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #mic-btn { background: #2d2d2d; border: 1px solid #555; font-size: 18px; padding: 10px 14px; flex-shrink: 0; }
    #mic-btn.recording { background: #ea4b71; border-color: #ea4b71; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .status { font-size: 12px; color: #888; padding: 0 20px 8px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header"><div class="header-dot"></div>n8n Agent</div>
    <div class="backend-row">
      <div class="backend-hint" id="backend-url"></div>
      <div class="backend-actions">
        <button class="mini-btn" id="reset-backend" type="button" title="Clear saved ngrok backend URL">Reset</button>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="message-row bot">
        <div class="message bot">Hello! I am your n8n assistant. You can type or use the 🎤 mic button to speak.</div>
      </div>
    </div>
    <div class="status" id="status"></div>
    <form class="input-area" id="chat-form">
      <button type="button" id="mic-btn" title="Click to record">🎤</button>
      <input type="text" id="input" placeholder="Type or speak a message..." autocomplete="off" />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    const status = document.getElementById('status');
    const backendHint = document.getElementById('backend-url');
    const resetBackendBtn = document.getElementById('reset-backend');

    const DEFAULT_N8N_BASE_URL = 'http://localhost:5678';

    function normalizeBaseUrl(baseUrl) {
      if (!baseUrl) return DEFAULT_N8N_BASE_URL;
      return baseUrl.trim().replace(/\/$/, '');
    }

    function getN8nBaseUrl() {
      const urlParam = new URLSearchParams(window.location.search).get('n8nBase');
      const stored = localStorage.getItem('N8N_BASE_URL');
      const selected = normalizeBaseUrl(urlParam || stored || DEFAULT_N8N_BASE_URL);

      if (urlParam) {
        localStorage.setItem('N8N_BASE_URL', selected);
      }

      return selected;
    }

    const N8N_BASE_URL = getN8nBaseUrl();
    const API_URL = `${N8N_BASE_URL}/webhook/chat-response`;
    const WHISPER_URL = `${N8N_BASE_URL}/webhook/whisper-proxy`;
    const TTS_URL = `${N8N_BASE_URL}/webhook/tts-proxy`;

    backendHint.textContent = `Backend: ${N8N_BASE_URL}`;

    resetBackendBtn.addEventListener('click', () => {
      localStorage.removeItem('N8N_BASE_URL');
      window.location.search = '';
    });

    function setStatus(msg) { status.textContent = msg; }

    function setUIBusy(busy) {
      input.disabled = busy;
      sendBtn.disabled = busy;
      micBtn.disabled = busy;
    }

    function ngrokHeaders(url) {
      if (url.includes('.ngrok-free.app')) {
        return { 'ngrok-skip-browser-warning': 'true' };
      }
      return {};
    }

    const PREFERS_LOCAL_TTS = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    function speakWithBrowserTTS(text) {
      if (!('speechSynthesis' in window)) return false;
      try {
        const utterance = new SpeechSynthesisUtterance(text);
        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
        return true;
      } catch (_err) {
        return false;
      }
    }

    async function readErrorResponse(res) {
      const raw = await res.text();
      const looksLikeNgrokWarning = raw.toLowerCase().includes('ngrok') && raw.toLowerCase().includes('browser warning');
      if (looksLikeNgrokWarning) {
        return 'ngrok browser warning page returned. Open backend URL once in browser and continue.';
      }
      return raw.slice(0, 200).replace(/\s+/g, ' ');
    }

    async function parseResponseBody(res) {
      const contentType = (res.headers.get('content-type') || '').toLowerCase();
      if (contentType.includes('application/json')) {
        return await res.json();
      }

      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch (_err) {
        return { output: text };
      }
    }

    // ── Add a user message bubble ─────────────────
    function addUserMessage(text) {
      const row = document.createElement('div');
      row.className = 'message-row user';
      const bubble = document.createElement('div');
      bubble.className = 'message user';
      bubble.textContent = text;
      row.appendChild(bubble);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    // ── Add a bot message bubble with TTS button ──
    function addBotMessage(text) {
      const row = document.createElement('div');
      row.className = 'message-row bot';

      const bubble = document.createElement('div');
      bubble.className = 'message bot';
      bubble.textContent = text;

      const ttsBtn = document.createElement('button');
      ttsBtn.className = 'tts-btn';
      ttsBtn.innerHTML = '🔊 Play';
      ttsBtn.title = 'Click to hear this response';

      ttsBtn.addEventListener('click', async () => {
        ttsBtn.disabled = true;
        ttsBtn.classList.add('playing');
        ttsBtn.innerHTML = '⏳ Loading...';
        setStatus('Generating speech...');

        if (PREFERS_LOCAL_TTS && speakWithBrowserTTS(text)) {
          ttsBtn.disabled = false;
          ttsBtn.classList.remove('playing');
          ttsBtn.innerHTML = '🔊 Play';
          setStatus('Using built-in browser voice for better mobile compatibility.');
          return;
        }

        try {
          const ttsRes = await fetch(TTS_URL + '?text=' + encodeURIComponent(text), {
            headers: ngrokHeaders(TTS_URL)
          });
          if (!ttsRes.ok) {
            const detail = await readErrorResponse(ttsRes);
            throw new Error(`HTTP ${ttsRes.status}: ${detail}`);
          }

          const audioBlob = await ttsRes.blob();
          const audioUrl = URL.createObjectURL(audioBlob);
          const audio = new Audio(audioUrl);

          const cleanup = () => {
            URL.revokeObjectURL(audioUrl);
            ttsBtn.disabled = false;
            ttsBtn.classList.remove('playing');
            ttsBtn.innerHTML = '🔊 Play';
            setStatus('');
          };

          audio.onended = cleanup;
          audio.onerror = () => {
            cleanup();
            if (speakWithBrowserTTS(text)) {
              setStatus('Remote audio unsupported; switched to browser voice.');
            } else {
              setStatus('TTS audio playback failed on this browser.');
            }
          };

          ttsBtn.innerHTML = '🔊 Playing...';
          try {
            await audio.play();
          } catch (playErr) {
            cleanup();
            if (speakWithBrowserTTS(text)) {
              setStatus('Browser blocked remote audio; used local speech fallback.');
            } else {
              setStatus('TTS blocked by browser autoplay policy. Tap play again.');
            }
            console.error('Audio play failed:', playErr);
          }
        } catch (err) {
          console.error('TTS error:', err);
          ttsBtn.innerHTML = '❌ Error';
          ttsBtn.disabled = false;
          ttsBtn.classList.remove('playing');
          setStatus('TTS error: ' + err.message);
        }
      });

      row.appendChild(bubble);
      row.appendChild(ttsBtn);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    // ── Send text to n8n, get reply ───────────────
    async function sendMessage(text) {
      if (!text.trim()) return;
      addUserMessage(text);
      input.value = '';
      setUIBusy(true);
      setStatus('Agent is thinking...');

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...ngrokHeaders(API_URL)
          },
          body: JSON.stringify({ message: text })
        });

        if (!res.ok) {
          const detail = await readErrorResponse(res);
          throw new Error(`HTTP ${res.status}: ${detail}`);
        }

        const data = await parseResponseBody(res);
        const reply = data.output || 'No response from agent.';
        addBotMessage(reply);
        setStatus('');
      } catch (err) {
        addBotMessage('Error: ' + err.message);
        console.error(err);
        setStatus('');
      } finally {
        setUIBusy(false);
        input.focus();
      }
    }

    // ── Text form submit ──────────────────────────
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage(input.value.trim());
    });

    // ── Voice recording ───────────────────────────
    let mediaRecorder = null;
    let audioChunks = [];

    micBtn.addEventListener('click', async () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

        mediaRecorder.onstop = async () => {
          micBtn.classList.remove('recording');
          micBtn.textContent = '🎤';
          stream.getTracks().forEach(t => t.stop());

          setStatus('Transcribing...');
          setUIBusy(true);

          try {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio_file', audioBlob, 'recording.webm');

            const whisperRes = await fetch(WHISPER_URL, {
              method: 'POST',
              headers: {
                ...ngrokHeaders(WHISPER_URL)
              },
              body: formData
            });

            if (!whisperRes.ok) {
              const detail = await readErrorResponse(whisperRes);
              throw new Error(`HTTP ${whisperRes.status}: ${detail}`);
            }

            const whisperData = await parseResponseBody(whisperRes);
            const transcript = whisperData.text?.trim();

            if (transcript) {
              setStatus('');
              setUIBusy(false);
              await sendMessage(transcript);
            } else {
              setStatus("Couldn't hear anything — try again.");
              setUIBusy(false);
            }
          } catch (err) {
            setStatus('Whisper error: ' + err.message);
            setUIBusy(false);
            console.error(err);
          }
        };

        mediaRecorder.start();
        micBtn.classList.add('recording');
        micBtn.textContent = '⏹';
        setStatus('Recording... click ⏹ to stop');

      } catch (err) {
        setStatus('Mic access denied: ' + err.message);
        console.error(err);
      }
    });
  </script>
</body>
</html>
